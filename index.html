<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App TRX Multi</title>
  <style>
    body{font-family:Arial; padding:15px; background:#f5f5f5; margin:0}
 .card{background:white; padding:15px; border-radius:10px; margin-bottom:15px}
    input, select, button{width:100%; padding:10px; margin:8px 0; border-radius:5px; border:1px solid #ccc; box-sizing:border-box}
    button{background:#2196F3; color:white; border:none}
    button.success{background:#4CAF50}
    button.danger{background:#f44336}
    table{width:100%; font-size:12px; border-collapse:collapse}
    th,td{border:1px solid #ddd; padding:6px}
    th{background:#2196F3; color:white}
 .hidden{display:none}
 .item-box{border:1px dashed #2196F3; padding:10px; margin:5px 0; border-radius:5px}
  </style>
</head>
<body>

<div id="pageLogin" class="card"><h2>Login</h2>
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Masuk</button>
</div>

<div id="pageMain" class="hidden">
  <h2>Halo <span id="namaUser"></span></h2>
  <div class="card">
    <h3>Input SJ</h3>
    <select id="pilihSheet"><option value="TRX FG KIRIM">TRX FG KIRIM</option><option value="HASIL THERMO">HASIL THERMO</option></select>
    <input type="date" id="tanggal">
    <input type="text" id="noSJ" placeholder="No Surat Jalan">
    <input type="text" id="noPol" placeholder="No Polisi">
    <input type="text" id="driver" placeholder="Driver">
    <hr>
    <h4>Tambah Barang</h4>
    <select id="spnBarang"></select>
    <input type="number" id="kirim" placeholder="Jumlah Kirim/QTY">
    <button onclick="tambahBarang()">+ Tambah ke List</button>
    <div id="listBarang"></div>
    <button class="success" onclick="simpan()">Simpan Semua Barang</button>
  </div>

  <div class="card">
    <h3>Riwayat</h3>
    <input type="date" id="filterTanggal">
    <button onclick="loadRiwayat()">Refresh</button>
    <div id="tabelRiwayat"></div>
  </div>
  <button class="danger" onclick="logout()">Logout</button>
</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyVCvLdqOVi3B2x3Zc20ihwnK3dJat0PjMb2e8LQQ3F3oZwd73XAiv54crvb84cr_GTxg/exec"; // <-- GANTI INI SETELAH DEPLOY
let loginUser = "";
let listItems = [];
let listBarangMaster = [];

window.onload = function() {
  document.getElementById('tanggal').valueAsDate = new Date();
  document.getElementById('filterTanggal').valueAsDate = new Date();
}

async function login(){
  const res = await fetch(`${WEBAPP_URL}?action=login&user=${document.getElementById('user').value}&pass=${document.getElementById('pass').value}`);
  const json = await res.json();
  if(json.status === "OK"){
    loginUser = json.nama; document.getElementById('namaUser').innerText = loginUser;
    document.getElementById('pageLogin').classList.add('hidden');
    document.getElementById('pageMain').classList.remove('hidden');
    getBarangMaster();
    loadRiwayat();
  } else { alert(json.msg); }
}
function logout(){ document.getElementById('pageMain').classList.add('hidden'); document.getElementById('pageLogin').classList.remove('hidden'); }

async function getBarangMaster(){
  const res = await fetch(WEBAPP_URL + "?action=getBarang");
  const json = await res.json();
  listBarangMaster = json.data;
  const spn = document.getElementById('spnBarang');
  spn.innerHTML = "<option value=''>--Pilih Barang--</option>";
  listBarangMaster.forEach((item) => {
    spn.innerHTML += `<option value="${item[0]}">${item[0]}</option>`;
  });
}

function tambahBarang(){
  const nama = document.getElementById('spnBarang').value;
  if(nama === "") return alert("Pilih barang dulu");
  listItems.push({"Nama Barang": nama, "Kirim": document.getElementById('kirim').value});
  tampilkanList();
  document.getElementById('kirim').value = "";
}
function tampilkanList(){
  let html = "";
  listItems.forEach((item, i) => {
    html += `<div class="item-box">${item['Nama Barang']} - ${item['Kirim']} Qty <button style="float:right;width:60px" onclick="hapusItem(${i})">X</button></div>`;
  });
  document.getElementById('listBarang').innerHTML = html;
}
function hapusItem(i){ listItems.splice(i,1); tampilkanList(); }

async function simpan() {
  if(listItems.length === 0) return alert("Tambah barang dulu minimal 1");
  const payload = {
    "_sheet": document.getElementById('pilihSheet').value,
    "Tanggal": document.getElementById('tanggal').value,
    "Nomer Surat Jalan": document.getElementById('noSJ').value,
    "No Polisi": document.getElementById('noPol').value,
    "Driver": document.getElementById('driver').value,
    "Keterangan": loginUser,
    "items": listItems
  };
  const res = await fetch(WEBAPP_URL, {method: "POST", body: JSON.stringify(payload)});
  const json = await res.json();
  if(json.status === "OK"){
    window.open(json.pdfUrls[0], "_blank");
    window.open("https://wa.me/?text=" + json.waText, "_blank");
    alert("Sukses. " + listItems.length + " barang disimpan");
    listItems = []; tampilkanList(); loadRiwayat();
  }
}

async function loadRiwayat(){
  const res = await fetch(`${WEBAPP_URL}?action=getRiwayat&sheet=${document.getElementById('pilihSheet').value}&tgl=${document.getElementById('filterTanggal').value}`);
  const json = await res.json();
  let html = "<table><tr><th>SJ</th><th>Barang</th><th>Kirim</th><th>Aksi</th></tr>";
  json.data.forEach(row => {
    html += `<tr><td>${row['Nomer Surat Jalan']}</td><td>${row['Nama Barang']}</td><td>${row.Kirim}</td>
    <td><button style="width:50px" onclick='editData("${document.getElementById('pilihSheet').value}",${row._row})'>Edit</button>
    <button style="width:50px" class="danger" onclick='deleteData("${document.getElementById('pilihSheet').value}",${row._row})'>Hapus</button></td></tr>`;
  });
  html += "</table>"; document.getElementById('tabelRiwayat').innerHTML = html;
}
async function editData(sheet,row){
  const baru = prompt("Qty Baru:");
  if(baru === null) return;
  await fetch(WEBAPP_URL, {method: "POST", body: JSON.stringify({"_action":"edit","_sheet":sheet,"_row":row,"Kirim":baru})});
  alert("Diupdate"); loadRiwayat();
}
async function deleteData(sheet,row){
  if(!confirm("Hapus?")) return;
  await fetch(WEBAPP_URL, {method: "POST", body: JSON.stringify({"_action":"delete","_sheet":sheet,"_row":row})});
  alert("Dihapus"); loadRiwayat();
}
</script>
</body>
</html>
