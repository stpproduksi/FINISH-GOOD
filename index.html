<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input FINISH GOOD</title>
  <style>
    body{font-family:sans-serif;padding:15px;background:#f5f5f5}
    .card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 5px #ccc}
    input,select,button{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:5px;font-size:16px}
    button{background:#28a745;color:white;border:none;font-weight:bold}
    button:active{background:#218838}
  </style>
</head>
<body>
  <div class="card">
    <h3>Input FINISH GOOD</h3>
    <form id="fgForm">
      <label>TANGGAL</label>
      <input type="date" name="tanggal" id="tanggal" required>

      <label>SHIFT</label>
      <select name="shift" required>
        <option value="">Pilih Shift</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>

      <label>PRODUK</label>
      <select name="produk" required>
        <option value="">Pilih Produk</option>
        <option>60 ML JELLY</option>
        <option>90 ML JELLY</option>
        <option>6 OZ NATURAL</option>
        <option>8 OZ NATURAL</option>
        <option>10 OZ NATURAL</option>
        <option>12 OZ NATURAL</option>
        <option>12 OZ NATURAL 7 gr</option>
        <option>14 OZ NATURAL</option>
        <option>16 OZ NATURAL</option>
        <option>BAHAN PRINTING 5,5 gr</option>
        <option>16 SLIM</option>
        <option>18 SLIM 9 gr</option>
        <option>18 SLIM 7,5 gr</option>
        <option>18 SLIM 7,0 gr</option>
        <option>22 SLIM 9 gr</option>
        <option>22 SLIM 8,5 gr</option>
        <option>22 SLIM 8,0 gr</option>
        <option>22 SLIM 7,0 gr</option>
        <option>SLOP PISAH 8,5 gr</option>
        <option>22 SLIM BAHAN PRINTING 8,0 gr</option>
        <option>BAHAN PRINTING 8,5 gr</option>
        <option>18 BIG ISI 50 PCS 7,0 gr</option>
        <option>18 BIG ISI 25 PCS 7,0 gr</option>
        <option>22 BIG ISI 50 PCS 7,0 gr</option>
        <option>22 BIG ISI 50 PCS 8 gr</option>
        <option>22 BIG ISI 50 PCS 8,5 gr</option>
        <option>26 BIG 8,0 gr BAHAN PRINTING @800</option>
        <option>26 BIG ISI 25 PCS 8,0 gr</option>
        <option>22 BIG ISI 50 PCS 8,0 gr BAHAN PRINTING</option>
        <option>12 OVAL 5,0 gr ISI 50 PCS</option>
        <option>14 OVAL 6,0 gr ISI 50 PCS</option>
        <option>14 OVAL 6,0 GR PRINTING</option>
        <option>16 OVAL 6,5 gr ISI 50 PCS</option>
        <option>18 OVAL 7,0 gr ISI 50 PCS</option>
        <option>22 OVAL 7,0 gr ISI 50 PCS</option>
        <option>22 OVAL 8,0 gr ISI 50 PCS</option>
        <option>8 SQUARE</option>
        <option>12 SQUARE</option>
        <option>16 SQUARE</option>
        <option>22 SQUARE</option>
        <option>8 SQUARE HANYA BODY</option>
        <option>12 SQUARE HANYA BODY</option>
        <option>16 SQUARE HANYA BODY</option>
        <option>22 SQUARE HANYA BODY</option>
        <option>TUTUP SQUARE</option>
        <option>10 OZ HALLO REGULER</option>
        <option>12 OZ HALLO REGULER</option>
        <option>14 OZ HALLO REGULER</option>
        <option>16 OZ HALLO REGULER</option>
        <option>18 OZ HALLO BIG</option>
        <option>18 OZ HALLO BIG 7GR TRIAL</option>
        <option>22 OZ HALLO BIG 7GR TRIAL</option>
        <option>22 OZ HALLO BIG</option>
        <option>18 BIG HALLO GITAR (HIJAU)</option>
        <option>22 BIG HALLO GITAR (HIJAU)</option>
        <option>18 OVAL GITAR (BIRU)</option>
        <option>22 OVAL GITAR (BIRU)</option>
        <option>18 BIG HOK GITAR (MERAH)</option>
        <option>22 BIG HOK GITAR (MERAH)</option>
        <option>16 PRINTING</option>
        <option>22 PRINTING</option>
        <option>18 OZ HALLO SLIM</option>
        <option>22 OZ HALLO SLIM</option>
      </select>

      <label>BOX</label>
      <input type="number" name="box" placeholder="Isi jumlah box" required>

      <button type="submit">SIMPAN</button>
    </form>
    <p id="msg"></p>
  </div>

<script>
  document.getElementById('tanggal').valueAsDate = new Date(); // auto isi tanggal hari ini
  
  const scriptURL = 'PASTE_WEB_APP_URL_DISINI' // <-- ganti dengan URL dari Apps Script
  
  document.getElementById('fgForm').addEventListener('submit', e => {
    e.preventDefault()
    fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
      .then(res => res.json())
      .then(data => {
        if(data.status == "sukses"){
          document.getElementById('msg').innerText = "Data tersimpan!";
          e.target.reset();
          document.getElementById('tanggal').valueAsDate = new Date();
        } else {
          document.getElementById('msg').innerText = "Gagal: " + data.msg;
        }
      })
      .catch(error => document.getElementById('msg').innerText = 'Error!' )
  })
</script>
</body>
</html>
