<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Produksi FG</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:Arial,sans-serif;padding:10px;background:#f0f2f5;margin:0}
    .tabs{display:flex;background:#ddd;border-radius:8px 8px 0 0;overflow:hidden}
    .tab{flex:1;padding:14px;text-align:center;background:#ddd;border:none;font-weight:bold;font-size:15px;cursor:pointer}
    .tab.active{background:#28a745;color:white}
    .card{background:white;padding:15px;border-radius:0 0 10px 10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);display:none}
    .card.active{display:block}
    h3{margin-top:0;text-align:center;color:#333}
    label{font-weight:bold;font-size:14px;margin-top:5px;display:block}
    input,select,button{width:100%;padding:12px;margin:6px 0 12px 0;border:1px solid #ccc;border-radius:6px;font-size:16px}
    button{background:#28a745;color:white;border:none;font-weight:bold;cursor:pointer}
    button:active{background:#218838}
    #msg{text-align:center;font-weight:bold;margin-top:10px;font-size:15px;min-height:24px}
    .sukses{color:green}.gagal{color:red}
  </style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="showTab('thermo')">HASIL THERMO</button>
  <button class="tab" onclick="showTab('trxfg')">TRX FG</button>
</div>

<!-- FORM 1: HASIL THERMO -->
<div id="thermo" class="card active">
  <h3>Input HASIL THERMO</h3>
  <form id="formThermo">
    <input type="hidden" name="form" value="thermo">
    <label>TANGGAL</label>
    <input type="date" name="tanggal" id="tgl1" required>

    <label>SHIFT</label>
    <select name="shift" required>
      <option value="">Pilih Shift</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
    </select>

    <label>PRODUK</label>
    <select name="produk" id="produk1" required><option>Loading Produk...</option></select>

    <label>BOX</label>
    <input type="number" name="box" placeholder="Jumlah Box" required>

    <label>QTY</label>
    <input type="number" name="qty" placeholder="Jumlah Qty/Pcs" required>

    <label>KETERANGAN</label>
    <input type="text" name="ket" placeholder="Opsional">
    <button type="submit">SIMPAN</button>
  </form>
</div>

<!-- FORM 2: TRX FG -->
<div id="trxfg" class="card">
  <h3>Input TRX FG</h3>
  <form id="formTrx">
    <input type="hidden" name="form" value="trxfg">
    <label>TGL</label>
    <input type="date" name="tgl" id="tgl2" required>

    <label>NO. SJ</label>
    <input type="text" name="noSJ" placeholder="No Surat Jalan" required>

    <label>PRODUK</label>
    <select name="produk2" id="produk2" required><option>Loading Produk...</option></select>

    <label>KIRIM</label>
    <input type="number" name="kirim" placeholder="Jumlah Kirim" required>

    <label>KETERANGAN</label>
    <input type="text" name="ket2" placeholder="Opsional">

    <label>NO POL</label>
    <input type="text" name="noPol" placeholder="Contoh: B 1234 CD">

    <label>DRIVER</label>
    <input type="text" name="driver" placeholder="Nama Driver">
    <button type="submit">SIMPAN</button>
  </form>
</div>

<p id="msg"></p>

<script>
  const scriptURL = 'PASTE_URL_DISINI' // <-- GANTI DENGAN URL APPS SCRIPT KAMU
  
  document.getElementById('tgl1').valueAsDate = new Date();
  document.getElementById('tgl2').valueAsDate = new Date();

  // Ambil data produk dari Sheet MASTER
  fetch(scriptURL)
  .then(res => res.json())
  .then(produk => {
      let opt1 = document.getElementById('produk1');
      let opt2 = document.getElementById('produk2');
      opt1.innerHTML = '<option value="">Pilih Produk</option>';
      opt2.innerHTML = '<option value="">Pilih Produk</option>';
      produk.forEach(p => {
        if(p != ""){ // skip baris kosong
          opt1.innerHTML += `<option>${p}</option>`;
          opt2.innerHTML += `<option>${p}</option>`;
        }
      })
  }).catch(err => {
      document.getElementById('produk1').innerHTML = '<option>Gagal load produk</option>';
      document.getElementById('produk2').innerHTML = '<option>Gagal load produk</option>';
  });

  function showTab(id){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
    document.querySelector(`[onclick="showTab('${id}')"]`).classList.add('active');
    document.getElementById(id).classList.add('active');
  }

  function submitForm(formId){
    document.getElementById(formId).addEventListener('submit', e => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      msg.className = "";
      msg.innerText = "Menyimpan...";
      
      fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: new FormData(e.target)})
      .then(() => {
          msg.className = "sukses";
          msg.innerText = "✅ Data tersimpan!";
          e.target.reset();
          document.getElementById('tgl1').valueAsDate = new Date();
          document.getElementById('tgl2').valueAsDate = new Date();
          setTimeout(()=>msg.innerText="",3000);
      }).catch(() => { 
          msg.className = "gagal"; 
          msg.innerText = "❌ Gagal koneksi ke server" 
      });
    })
  }
  submitForm('formThermo');
  submitForm('formTrx');
</script>
</body>
</html>
